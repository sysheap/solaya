[build]
target = "riscv64gc-unknown-linux-musl"
# Leave it here in case we need it in the future
# Or just if we forget and get here by accident to remember
rustflags = ["-Ctarget-feature=+relax"]

[target.riscv64gc-unknown-linux-musl]
# Resolved on $PATH via cmake/clang_wrapper.cmake's generated shell scripts
# under ${SOLAYA_CROSS_BIN}; userspace/CMakeLists.txt prepends that dir to
# PATH for every cargo invocation.
linker = "riscv64-linux-musl-clang"
rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-gnu]
linker = "gcc"
