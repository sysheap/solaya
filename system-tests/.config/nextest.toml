[profile.default]
slow-timeout = { period = "10s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "test(doom_starts)"
slow-timeout = { period = "20s", terminate-after = 1 }

[[profile.default.overrides]]
filter = "test(tcp_throughput)"
slow-timeout = { period = "30s", terminate-after = 2 }

[[profile.default.overrides]]
filter = "test(tcp_stress)"
slow-timeout = { period = "180s", terminate-after = 2 }

[profile.deadlock-hunt]
slow-timeout = { period = "3600s", terminate-after = 1 }
test-threads = 1
