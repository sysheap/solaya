name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # CMakePresets.json defaults to this path for the build tree.
      BUILD_DIR: ${{ github.workspace }}/build
    steps:
      - uses: actions/checkout@v6

      - name: Install host build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake ninja-build \
            python3 \
            clang-18 lld-18 llvm-18 libclang-dev \
            tmux \
            flex bison bc \
            pkg-config \
            rsync \
            e2fsprogs \
            qemu-system-misc qemu-system-data seabios ipxe-qemu
          # clang-18 / lld-18 / llvm-18 are the cross-toolchain; Ubuntu
          # 24.04 ships LLVM 18 as versioned packages, which cmake/llvm_tools
          # picks via its clang-18..clang-22 fallback chain. libclang-dev is
          # for the host bindgen-driver, not the cross compile. texinfo,
          # gawk and cross-gcc host deps are no longer needed now that the
          # toolchain bootstrap only compiles musl + linux-headers +
          # compiler-rt with distro clang.
          #
          # seabios provides /usr/share/seabios/vgabios-bochs-display.bin
          # (needed by the framebuffer + doom tests which use -device
          # bochs-display); on Ubuntu 24.04 this file is no longer in
          # qemu-system-data. ipxe-qemu provides efi-virtio.rom and other
          # PCI option ROMs that QEMU loads unconditionally for
          # virtio-net-pci; it is a Recommends of qemu-system-misc, so
          # --no-install-recommends drops it and we have to list it
          # explicitly. e2fsprogs provides mkfs.ext2 for the ext2 tests.
          # Keep this list in sync with README.md's host-prereq section.

      - name: Install Rust toolchain from rust-toolchain.toml
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain none --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          $HOME/.cargo/bin/cargo --version
          $HOME/.cargo/bin/rustc --version

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Cache cargo's registry + per-workspace target dirs. Key derives from
      # Cargo.lock hashes and rust-toolchain.toml automatically. Saves minutes
      # per run — the kernel, userspace, system-tests, mcp-server, and
      # bindgen-driver all have large crate graphs that the old Nix-based CI
      # cached via a separate mechanism.
      - name: Cache cargo registry + target dirs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            userspace -> ../build/userspace/target
            system-tests -> target
            mcp-server -> target
            tools/bindgen-driver -> target
          shared-key: solaya-riscv64

      # The cross-toolchain sysroot (musl + linux-headers + compiler-rt
      # builtins) is reproducible from the SHA256-pinned tarballs declared
      # in cmake/checksums.cmake; cache the installed output keyed on the
      # hash of those pins plus the bootstrap script. Using restore +
      # explicit save (instead of actions/cache@v4) so the cache persists
      # even when a later CI step fails — on cache miss toolchain-all takes
      # ~2 min (musl + compiler-rt), which we'd still rather not re-run on
      # every failed CI retry.
      - name: Restore cross-toolchain cache
        id: cache-toolchain
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.toolchain
          key: toolchain-${{ runner.os }}-${{ hashFiles('cmake/checksums.cmake', 'cmake/toolchain_bootstrap.cmake', 'toolchain/pins.cmake') }}

      - name: Configure CMake
        run: cmake -S . -B "$BUILD_DIR" --preset riscv64-virt

      - name: Build cross-toolchain (cache miss only, about 2 min first time)
        id: build-toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: cmake --build "$BUILD_DIR" --target toolchain-all

      # Save immediately after a successful toolchain build so we don't lose
      # the artifact when a subsequent step (kernel build / clippy / tests)
      # fails. Skipped on cache hit (outcome == 'skipped').
      - name: Save cross-toolchain cache
        if: always() && steps.build-toolchain.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.toolchain
          key: toolchain-${{ runner.os }}-${{ hashFiles('cmake/checksums.cmake', 'cmake/toolchain_bootstrap.cmake', 'toolchain/pins.cmake') }}

      - name: Build kernel
        run: cmake --build "$BUILD_DIR" --target solaya-bin

      - name: Format check
        run: cmake --build "$BUILD_DIR" --target fmt-check

      - name: Clippy
        run: cmake --build "$BUILD_DIR" --target clippy

      - name: Unit tests
        run: cmake --build "$BUILD_DIR" --target test-unit

      - name: Miri
        run: cmake --build "$BUILD_DIR" --target miri

      - name: System tests
        run: cmake --build "$BUILD_DIR" --target test-system
