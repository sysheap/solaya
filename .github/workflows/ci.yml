name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'rust-toolchain') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-
          save-always: true

      - uses: nicknovitski/nix-develop@v1
        with:
          arguments: .#ci

      - name: Build code
        run: just build

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: just clippy

      - name: Unit tests
        run: just unit-test

      - name: Miri
        run: just miri

      - name: System tests
        run: just system-test

      - name: Kani
        run: just kani
